name: simplebackupapp

services:
  api:
    build:
      context: ./api
    container_name: backup-api
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      UPLOAD_DIR: /data/uploads
    volumes:
      - ${BACKUP_PATH:-./uploads}:/data/uploads
    ports:
      - "${API_BIND:-127.0.0.1:4000:4000}"

  frontend:
    build:
      context: ./frontend
    container_name: backup-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_BIND:-127.0.0.1:8080:80}"
