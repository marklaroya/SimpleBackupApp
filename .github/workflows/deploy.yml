name: Deploy on Dell Server

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy from server checkout
        run: |
          test -f /opt/apps/simplebackup/.env
          git -C /opt/apps/simplebackup fetch origin main
          git -C /opt/apps/simplebackup checkout main
          git -C /opt/apps/simplebackup pull --ff-only origin main
          docker compose -f /opt/apps/simplebackup/docker-compose.yml --env-file /opt/apps/simplebackup/.env down
          docker compose -f /opt/apps/simplebackup/docker-compose.yml --env-file /opt/apps/simplebackup/.env up -d --build
          docker image prune -f
